<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Physik Applets – Matthias Miedl</title>
    <style>
        :root {
            --bg-color: #f4f7f9;
            --card-bg: #ffffff;
            --text-color: #2c3e50;
            --accent-color: #007aff;
            --hover-bg: #f0f0f0;
            --shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
            --font-main: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: var(--font-main);
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header { text-align: center; margin-bottom: 40px; margin-top: 20px; }
        h1 { font-size: 2.2rem; font-weight: 800; margin: 0; color: var(--text-color); }
        p { color: #7f8c8d; margin-top: 10px; font-size: 1.1rem; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1100px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 20px;
            box-shadow: var(--shadow);
            text-decoration: none;
            color: var(--text-color);
            padding: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            transition: all 0.2s ease-in-out;
            border: 1px solid rgba(0,0,0,0.03);
        }

        @media (hover: hover) {
            .card:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(0,0,0,0.12); border-color: var(--accent-color); }
        }

        .card:active { transform: scale(0.95); background-color: var(--hover-bg); }
        .card-icon { font-size: 3.5rem; margin-bottom: 15px; }
        .card-title { font-size: 1.1rem; font-weight: 700; line-height: 1.3; }

        footer { margin-top: 60px; padding-bottom: 30px; font-size: 0.9rem; color: #95a5a6; }
    </style>
</head>
<body>

    <header>
        <h1>Physik Interaktiv</h1>
        <p>Digitale Lernumgebungen für das iPad</p>
    </header>

    <main class="grid" id="app-grid"></main>

    <footer>
        &copy; <span id="year"></span> – mmiedl811.github.io
    </footer>

    <script>
        // HIER SIND DEINE THEMEN:
        const myApps = [
  { title: "Klasse 8 Quiz zu Geschwindigkeit", path: "quiz", icon: "🎮" },
  { title: "Geschwindigkeitsänderung", path: "v_aenderung", icon: "🏎️" },
  { title: "Energiestufenmodell", path: "energiestufenmodell", icon: "⚛️" },
  { title: "Richtungsänderung nach Stoß", path: "impuls", icon: "↗️" },
  { title: "Größe Impuls", path: "impulsdiagramm", icon: "💥" },
  { title: "Bewegungsdiagramme", path: "diagramme", icon: "📈" },
  { title: "Schwingungen", path: "schwingungen", icon: "🪶" }
];

        document.addEventListener("DOMContentLoaded", () => {
            const grid = document.getElementById('app-grid');
            document.getElementById('year').textContent = new Date().getFullYear();

            myApps.forEach(app => {
                const card = document.createElement('a');
                card.href = app.path + "/"; 
                card.className = 'card';
                card.innerHTML = `
                    <div class="card-icon">${app.icon}</div>
                    <div class="card-title">${app.title}</div>
                `;
                grid.appendChild(card);
            });
        });
    </script>
</body>
</html>
